name: Test Dev Setup Script

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint script
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: bash -n setup-dev-machine.sh

      - name: Install ShellCheck
        run: brew install shellcheck

      - name: Run ShellCheck
        run: shellcheck setup-dev-machine.sh

  dry-run:
    name: Dry run setup
    runs-on: macos-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Run setup script (dry run)
        run: bash setup-dev-machine.sh --dry-run

  install:
    name: Run actual setup
    runs-on: macos-latest
    needs: dry-run

    steps:
      - uses: actions/checkout@v4

      - name: Run setup script
        run: bash setup-dev-machine.sh

  verify:
    name: Verify installation
    runs-on: macos-latest
    needs: install

    steps:
      - uses: actions/checkout@v4

      - name: Verify tools
        run: |
          for cmd in eza rg lazygit starship zoxide; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              echo "$cmd missing"
              exit 1
            fi
          done

      - name: Verify symlinks
        run: |
          test -L ~/.config/starship.toml
          test -L ~/.config/ghostty/config

      - name: Test zsh config
        run: |
          zsh -c "set -e; source ~/.zshrc"

      - name: Test starship
        run: |
          starship explain
