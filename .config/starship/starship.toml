add_newline = true

format = """
$directory
$git_branch$git_status
$nodejs$python
$character
"""

[directory]
style = "bold cyan"
truncate_to_repo = false
truncation_length = 0
read_only = " 🔒"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[cmd_duration]
min_time = 1000
format = " ⏱ $duration"
style = "bold yellow"

[status]
disabled = false
symbol = "❌ "
format = '[$symbol$status]($style) '
style = "bold red"

[git_branch]
symbol = "🌱 "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style))'
style = "bold red"

[nodejs]
symbol = "⬢ "
style = "green"
format = " [$symbol($version)]($style)"

[python]
symbol = "🐍 "
style = "yellow"
format = " [$symbol($version)]($style)"

[docker_context]
symbol = "🐳 "
format = " [$symbol$context]($style)"
style = "blue"